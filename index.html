<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>地震情報ログ</title>

<style>
body{
font-family:"Hiragino Sans","Segoe UI",sans-serif;
background:#000;
color:#fff;
margin:0;
padding:20px;
}

#container{
max-width:900px;
margin:auto;
}

h1{
font-size:28px;
margin-bottom:20px;
font-weight:600;
}

.card{
background:#111;
border-radius:14px;
padding:20px;
margin-bottom:25px;
border:1px solid #333;
box-shadow:0 4px 20px rgba(255,255,255,0.05);
}

textarea{
width:100%;
height:300px;
background:#000;
color:#fff;
border:none;
padding:12px;
border-radius:8px;
resize:none;
font-size:15px;
line-height:1.7;
font-family:Consolas,Menlo,monospace;
}

button{
background:#fff;
color:#000;
padding:8px 16px;
border-radius:6px;
border:none;
cursor:pointer;
font-weight:600;
margin-right:10px;
margin-bottom:5px;
}

button:hover{
background:#ccc;
}

.title{
font-size:20px;
margin-bottom:10px;
}

#status{
font-size:12px;
color:#aaa;
margin-top:5px;
}
</style>
</head>

<body>

<div id="container">

<h1>地震情報（過去5回分）</h1>

<div class="card">

<button onclick="copyAll()">全件コピー</button>
<button onclick="loadLogs()">今すぐ更新</button>
<button onclick="enableAutoCopy()">自動コピー</button>

<br>

<button onclick="setTsunami('auto')">自動</button>
<button onclick="setTsunami('none')">なし</button>
<button onclick="setTsunami('forecast')">予報</button>
<button onclick="setTsunami('advisory')">注意報</button>
<button onclick="setTsunami('warning')">警報</button>
<button onclick="setTsunami('major')">大津波警報</button>

<div id="status">更新待機中...</div>

</div>

<div id="logs"></div>

</div>

<script>

let AUTO_COPY = false;
let lastHash = "";

// =====================================================
// ★ WebSocket（追加のみ・既存処理には一切干渉しない）
// =====================================================
let ws = null;
const WS_URL = "wss://api.p2pquake.net/v2/ws";

function connectWebSocket(){

  try{

    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      document.getElementById("status").innerText += " | WS接続中";
    };

    ws.onmessage = (event) => {
      try{
        const data = JSON.parse(event.data);

        // 地震データ受信時のみトリガー
        if(data && data.earthquake){

          // ★重要：既存処理を一切壊さない
          loadLogs();
        }

      }catch(e){
        console.log("WS parse error", e);
      }
    };

    ws.onclose = () => {

      document.getElementById("status").innerText += " | WS切断";

      // 再接続（既存ロジックに影響なし）
      setTimeout(connectWebSocket, 3000);
    };

    ws.onerror = () => {
      console.log("WS error");
    };

  }catch(e){
    console.log("WS接続失敗", e);
  }
}

// =====================================================
// ★ ここから下は「完全にあなたの元コードそのまま」
// =====================================================

let tsunamiMode = "auto";

let tsunamiText = "取得中...";
let tsunamiTimer = 0;

async function fetchTsunami(){
  try{
    const res = await fetch("https://www.data.jma.go.jp/developer/xml/feed/eqvol.xml");
    const xmlText = await res.text();

    const parser = new DOMParser();
    const xml = parser.parseFromString(xmlText, "text/xml");

    const entries = xml.getElementsByTagName("entry");

    if(!entries || entries.length === 0){
      tsunamiText = "津波情報取得失敗";
      return;
    }

    const latestTitle =
      entries[0].getElementsByTagName("title")[0]?.textContent || "";

    if(latestTitle.includes("津波") && latestTitle.includes("解除")){
      tsunamiText = "現在、津波に関する情報は発表されていません";
      return;
    }

    const priority = ["大津波警報","津波警報","津波注意報","津波予報"];
    let found = null;

    for(const p of priority){
      for(let i=0;i<entries.length;i++){
        const title = entries[i].getElementsByTagName("title")[0]?.textContent || "";
        const summary = entries[i].getElementsByTagName("summary")[0]?.textContent || "";
        if((title + summary).includes(p)){
          found = p;
          break;
        }
      }
      if(found) break;
    }

    if(found === "大津波警報"){
      tsunamiText = "〈⚠ 大津波警報〉\n現在大津波警報を発表中です";
    }
    else if(found === "津波警報"){
      tsunamiText = "〈⚠ 津波警報〉\n現在津波警報を発表中です";
    }
    else if(found === "津波注意報"){
      tsunamiText = "〈津波注意報〉\n現在津波注意報を発表中です";
    }
    else if(found === "津波予報"){
      tsunamiText = "〈津波予報〉\n現在津波予報を発表中です";
    }
    else{
      tsunamiText = "現在、津波に関する情報は発表されていません";
    }

  }catch(e){
    tsunamiText = "津波情報取得失敗";
  }
}

function setTsunami(mode){
  tsunamiMode = mode;
}

function getTsunamiDisplay(){

  if(tsunamiMode === "none"){
    return "現在、津波に関する情報は発表されていません";
  }
  if(tsunamiMode === "forecast"){
    return "〈津波予報〉\n現在津波予報を発表中です";
  }
  if(tsunamiMode === "advisory"){
    return "〈津波注意報〉\n現在津波注意報を発表中です";
  }
  if(tsunamiMode === "warning"){
    return "〈⚠ 津波警報〉\n現在津波警報を発表中です";
  }
  if(tsunamiMode === "major"){
    return "〈⚠ 大津波警報〉\n現在大津波警報を発表中です";
  }

  return tsunamiText;
}

function enableAutoCopy(){
  AUTO_COPY = true;
}

function formatTimeBlock(label, date){
  const d = new Date(date);
  return "■ "+label+"\n　"+
    d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日 "+
    d.getHours()+"時"+String(d.getMinutes()).padStart(2,"0")+"分";
}

function formatTimeOneLine(date){
  const d = new Date(date);
  return d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日 "+
         d.getHours()+"時"+String(d.getMinutes()).padStart(2,"0")+"分";
}

// =====================
// ★ここも完全維持（削ってない）
// =====================

function normalizeCityName(raw){
  if (!raw) return "不明";
  raw = raw.replace(/[０-９Ａ-Ｚａ-ｚ]/g, s => String.fromCharCode(s.charCodeAt(0) - 65248));
  raw = raw.replace(/\s+/g, "");
  raw = raw.replace(/（.*?）/g, "");
  raw = raw.replace(/[-ー－]+$/g, "");

  const specialCities = [
    "田村市","市川市","市原市","野々市市","四日市市","町田市","十日町市",
    "大町市","山村市","村山市","東村山市","武蔵村山市","羽村市","大村市",
    "余市町","市貝町","上市町","市川三郷町","市川町","下市町",
    "大町町","村田町","玉村町","中村区"
  ];
  if (specialCities.includes(raw)) return raw;

  const posCity = raw.indexOf("市");
  if (posCity > 0) return raw.substring(0, posCity + 1);

  const chars = ["区","町","村"];
  let cutPos = -1;
  for (const c of chars) {
    const pos = raw.indexOf(c);
    if (pos > 0 && (cutPos === -1 || pos < cutPos)) cutPos = pos;
  }

  if (cutPos > 0) return raw.substring(0, cutPos + 1);
  return raw;
}

function normalizePref(pref){
  if(!pref)return"不明";
  pref=pref.replace(/\s+/g,"");
  if(pref==="東京")return"東京都";
  if(pref==="大阪")return"大阪府";
  if(pref==="京都")return"京都府";
  if(!/都|道|府|県$/.test(pref))return pref+"県";
  return pref;
}

function buildIntensity(points){

  const cityMax = {};

  points.forEach(p => {
    const pref = normalizePref(p.pref || p.area || "不明");
    const city = normalizeCityName(p.city || p.addr || p.station || p.area || "不明");
    const scale = p.scale;
    const key = pref + ":" + city;

    if (!cityMax[key] || cityMax[key] < scale) {
      cityMax[key] = scale;
    }
  });

  const grouped = {};

  Object.entries(cityMax).forEach(([key, scale]) => {
    const [pref, city] = key.split(":");

    if (!grouped[scale]) grouped[scale] = {};
    if (!grouped[scale][pref]) grouped[scale][pref] = [];

    grouped[scale][pref].push(city);
  });

  const ORDER = [70,60,55,50,45,40,30,20,10];
  const scaleMap = {10:"1",20:"2",30:"3",40:"4",45:"5弱",50:"5強",55:"6弱",60:"6強",70:"7"};

  let out = "";

  ORDER.forEach(s => {
    if (!grouped[s]) return;

    out += "【震度" + scaleMap[s] + "】\n";
    out += "━━━━━━━━━━━\n";

    Object.keys(grouped[s]).sort().forEach(pref => {
      const cities = [...new Set(grouped[s][pref])];

      out += "■ " + pref + "\n";
      out += "  ・" + cities.join("　") + "\n\n";
    });
  });

  return out.trimEnd();
}

// =====================
// メイン（変更なし）
// =====================

async function loadLogs(){

  document.getElementById("status").innerText =
    "最終更新: " + formatTimeOneLine(new Date());

  if(Date.now() - tsunamiTimer > 10000){
    await fetchTsunami();
    tsunamiTimer = Date.now();
  }

  const res = await fetch("https://api.p2pquake.net/v2/history?codes=551&limit=5");
  const data = await res.json();

  let html="";
  let allText="";
  let latestText="";

  // 震度変換用のマップ
  const scaleMap = {10:"1",20:"2",30:"3",40:"4",45:"5弱",50:"5強",55:"6弱",60:"6強",70:"7"};

  for(let i=0;i<data.length;i++){

    const q=data[i];
    const eq=q.earthquake;
    const h=eq.hypocenter||{};

    // --- 変更後 ---
　　　let depth="不明";
　　　if(h.depth===0) depth="ごく浅い";
　　　else if(h.depth!=null) depth=h.depth+"km";

　　　// ここで「ごく浅い」の時は「約」をつけないロジックを追加
　　　const depthDisplay = (depth === "ごく浅い") ? "ごく浅い" : "約" + depth;

    const maxRaw = q.points.reduce((m,p)=>Math.max(m,p.scale||0),0);
    let magStr = (typeof h.magnitude==="number") ? h.magnitude.toFixed(1) : "---";

const intensityRaw = buildIntensity(q.points);
    const formattedIntensity = intensityRaw
        .split('\n')
        .filter(line => line.trim() !== "" && !line.includes("━━━━━━━━━━━"))
        .map(line => {
            // 震度階級のヘッダー（▽震度X）の場合、前に空行を入れて改行を確保
            if (line.includes("【震度")) return "\n" + line.replace(/【震度(.*?)】/, "▽震度$1");
            // 県名（【県名】）
            if (line.includes("■ ")) return line.replace(/■ (.*)/, "【$1】");
            // 都市名の前の「・」を消して整列
            return line.replace(/[  ]*・/g, "");
        })
        .join('\n')
        .trim(); // 最初の不要な改行を削除

    // 津波情報の文言処理
    let tsunamiMsg = getTsunamiDisplay();
    if (tsunamiMsg.includes("発表されていません")) {
        tsunamiMsg = "この地震による津波の心配はありません。";
    }

    const text = 
`《地震情報》
${formatTimeOneLine(eq.time)}頃、${h.name || "不明"}で地震がありました。
　最大震度: ${scaleMap[maxRaw]||"---"}
　M${magStr}
　震源の深さ:${depthDisplay}
${tsunamiMsg}

　●各地の震度情報●
${formattedIntensity}`;

    if(i===0)latestText=text;

    html+=
    "<div class='card'>"+
    "<div class='title'>"+(i+1)+"件目の地震</div>"+
    "<button onclick='copyOne(this)'>コピー</button>"+
    "<textarea readonly>"+text+"</textarea>"+
    "</div>";

    allText+=text+"\n";
  }

  window.ALL_LOGS=allText.trimEnd();
  document.getElementById("logs").innerHTML=html;

  if (AUTO_COPY && latestText !== lastHash) {
    lastHash = latestText;
    navigator.clipboard.writeText(latestText);
  }
}
function copyOne(btn){
  navigator.clipboard.writeText(btn.parentElement.querySelector("textarea").value);
}

function copyAll(){
  navigator.clipboard.writeText(window.ALL_LOGS||"");
}

// =====================
// 起動
// =====================

loadLogs();
setInterval(loadLogs,2000);
connectWebSocket();

</script>

</body>
</html>
